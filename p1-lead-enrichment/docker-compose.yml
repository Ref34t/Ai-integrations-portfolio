services:

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-p1user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-p1pass}
      POSTGRES_DB: ${POSTGRES_DB:-p1_leads}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-p1user}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
